<svg xmlns="http://www.w3.org/2000/svg" onload="alert('svg onload')">
  <script type="application/ecmascript">
    console.log('script tag executed');
  </script>
  <script type="text/javascript">
    console.log('script tag executed');
  </script>

  <rect width="100" height="100" fill="red"
        onclick="console.log('rect click')" />

    <foreignObject width="200" height="100">
    <div xmlns="http://www.w3.org/1999/xhtml">

      <script>
        console.log('foreignObject script ran');
      </script>

      <button onclick="console.log('button click')">
        click
      </button>

      <img src="invalid.jpg" onerror="console.log('image error event')" />

      <input oninput="console.log('input event')" />

    </div>
  </foreignObject>

  <circle cx="50" cy="50" r="40"
          onclick="console.log('circle click')"
          onmouseover="console.log('hover')"
          onmousedown="console.log('mouse down')" />
</svg>